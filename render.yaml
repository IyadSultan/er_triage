services:
  - type: web
    name: er-triage
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn er_triage.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: er-triage-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: FERNET_KEY
        sync: false

databases:
  - name: er-triage-db
    plan: free
